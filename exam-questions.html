<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Exam Questions</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Add DataTables CSS for answer tables if not already present -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
</head>
<body>
  <header>
    <h1 id="exam-title">Exam Questions</h1>
    <div class="user-info">
      <span id="teacher-email"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <div class="back-link">
      <a href="teacher.html">&larr; Back to Dashboard</a>
    </div>

    <section class="add-question card" id="add-question-section">
      <h2>Add New Question</h2>
      <div class="form-group">
        <label for="question-title">Title</label>
        <input type="text" id="question-title" placeholder="Question title">
      </div>
      <div class="form-group">
        <label for="question-description">Description</label>
        <textarea id="question-description" rows="4" placeholder="Detailed question description"></textarea>
      </div>
      <div class="form-group">
        <label for="question-topics">Topics (comma separated)</label>
        <input type="text" id="question-topics" placeholder="Topic1, Topic2, Topic3">
      </div>
      <div class="form-group">
        <label for="question-subtopics">Subtopics (comma separated)</label>
        <input type="text" id="question-subtopics" placeholder="Subtopic1, Subtopic2">
      </div>
      <div class="form-group">
        <label for="question-plan">Plan/Guidelines</label>
        <textarea id="question-plan" rows="3" placeholder="Solution plan or guidelines"></textarea>
      </div>
      <div class="form-group">
        <label for="question-explanation-template">Explanation Template</label>
        <textarea id="question-explanation-template" rows="5" placeholder="Template students can use to explain their answer"></textarea>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="question-published" checked>
          Published (visible to students)
        </label>
      </div>
      <button class="btn-primary" onclick="addQuestion()">Add Question</button>
    </section>

    <!-- Edit Question Modal -->
    <div id="edit-question-modal" class="modal" style="display:none;">
      <div class="modal-content card">
        <span class="close" onclick="closeEditModal()">&times;</span>
        <h2>Edit Question</h2>
        <div class="form-group">
          <label for="edit-question-title">Title</label>
          <input type="text" id="edit-question-title" placeholder="Question title">
        </div>
        <div class="form-group">
          <label for="edit-question-description">Description</label>
          <textarea id="edit-question-description" rows="4" placeholder="Detailed question description"></textarea>
        </div>
        <div class="form-group">
          <label for="edit-question-topics">Topics (comma separated)</label>
          <input type="text" id="edit-question-topics" placeholder="Topic1, Topic2, Topic3">
        </div>
        <div class="form-group">
          <label for="edit-question-subtopics">Subtopics (comma separated)</label>
          <input type="text" id="edit-question-subtopics" placeholder="Subtopic1, Subtopic2">
        </div>
        <div class="form-group">
          <label for="edit-question-plan">Plan/Guidelines</label>
          <textarea id="edit-question-plan" rows="3" placeholder="Solution plan or guidelines"></textarea>
        </div>
        <div class="form-group">
          <label for="edit-question-explanation-template">Explanation Template</label>
          <textarea id="edit-question-explanation-template" rows="5" placeholder="Template students can use to explain their answer"></textarea>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="edit-question-published">
            Published (visible to students)
          </label>
        </div>
        <button class="btn-primary" onclick="saveEditedQuestion()">Save Changes</button>
        <button class="btn-secondary" onclick="closeEditModal()">Cancel</button>
      </div>
    </div>

    <section class="import-questions card">
      <h2>Import Questions from CSV</h2>
      <div class="form-group">
        <label for="csv-file">CSV File</label>
        <input type="file" id="csv-file" accept=".csv">
      </div>
      <button class="btn-secondary" onclick="importQuestions()">Import Questions</button>
      <p class="hint">CSV format: Title,Description,Topics,Subtopics,Plan,Explanation Template</p>
      <div class="form-group">
        <label for="csv-sample-prompt">Sample Prompt to Generate CSV</label>
        <textarea id="csv-sample-prompt" rows="24" readonly>Here is a prompt template you can use to generate similar CSV question banks in the future:

---

Prompt:

Generate a CSV with [NUMBER] [SUBJECT] exam questions without [CONSTRAINT] on [TOPIC] topics for [GRADE LEVEL] students.

Output only raw CSV.
Do not use markdown.
Do not add explanations before or after the CSV.

Use this exact header row:
Title,Description,Topics,Subtopics,Plan,Explanation Template

Requirements:
- Create questions for [SKILL LEVEL] [SUBJECT] students.
- Each row must have exactly 6 columns.
- [TOPIC TYPE] Topics should be broad categories separated by semicolons when there are multiple values.
- [SUBTOPIC TYPE] Subtopics should be specific concepts separated by semicolons when there are multiple values.
- Plan should contain short teacher guidelines for evaluating the student's code. Focus on what to observe, not giving away answers.
- Explanation Template should help the student explain their [SUBJECT] code in simple English sentences. Use tokens in brackets [like this] that the student must fill in. Include "A possible improvement is [improvement]." and "So this code works because [final reason]." to encourage critical thinking.
- Escape commas correctly using CSV quoting when needed.

---

Example filled version for Python/math:

Generate a CSV with 50 Python exam questions without Python loops on class 5678 math topics for class 567 students.

Output only raw CSV.
Do not use markdown.
Do not add explanations before or after the CSV.

Use this exact header row:
Title,Description,Topics,Subtopics,Plan,Explanation Template

Requirements:
- Create questions for beginner Python coding students.
- Each row must have exactly 6 columns.
- Python Topics should be broad categories separated by semicolons when there are multiple values.
- Math Subtopics should be specific concepts separated by semicolons when there are multiple values.
- Plan should contain short teacher guidelines for evaluating the student's code. Focus on what to observe, not giving away answers.
- Explanation Template should help the student explain their Python code to the teacher in simple English sentences. Use tokens in brackets [like this] that the student must fill in. Include "A possible improvement is [improvement]." and "So this code works because [final reason]." to encourage critical thinking.
- Escape commas correctly using CSV quoting when needed.

---

Customization notes:

[NUMBER] = How many questions (e.g., 30, 50, 100)
[SUBJECT] = Subject area (e.g., Python, JavaScript, SQL)
[CONSTRAINT] = Restriction to avoid (e.g., Python loops, list comprehensions, recursion)
[TOPIC] = Core topic area (e.g., class 5678 math, data structures, algorithms)
[GRADE LEVEL] = Target student level (e.g., class 567, grade 8-10, beginners)
[SKILL LEVEL] = Student skill level (e.g., beginner, intermediate, advanced)
[TOPIC TYPE] = What to put in Topics column (e.g., Python Topics, Programming Concepts)
[SUBTOPIC TYPE] = What to put in Subtopics column (e.g., Math Subtopics, Coding Techniques)

A sample CSV row could look like:
"Odd or Even?","Player enters a number and program tells if it's odd or even using modulo operator.","Number System","Whole Numbers","1. Ask player for a whole number. 2. Use if-else with modulo operator (number % 2 == 0). 3. Print 'even' or 'odd'. 4. Ask if they want to play again (simple restart with new run).","Explanation:
My Python program solves the question by [brief purpose].
First, I take input from the user using [input method].
Then I use [logic or operator] to check whether the number is odd or even.
I used [if/else or other structure] so the program can choose the correct output.
A possible improvement is [improvement].
So this code works because [final reason]."
</textarea>
      </div>
    </section>

    <section class="questions-list">
      <h2>Exam Questions</h2>
      <div class="view-toggle">
        <button id="card-view-btn" class="btn-secondary" onclick="showCardView()">Card View</button>
        <button id="table-view-btn" class="btn-secondary" onclick="showTableView()">Table View</button>
        <button id="unpublish-selected-btn" class="btn-danger" onclick="unpublishSelectedQuestions()" style="margin-left:16px;">Unpublish Selected</button>
        <button id="export-text-answers-btn" class="btn-secondary" onclick="exportTextAnswersCSV()" style="margin-left:16px;">Export Text Answers CSV</button>
        <button id="export-questions-btn" class="btn-secondary" onclick="exportQuestionsCSV()" style="margin-left:16px;">Export Questions CSV</button>
      </div>
      <div id="questions-by-student-container">
        <!-- Grouped questions by student will be rendered here by JS -->
      </div>
      <div id="questions-table-container" style="display:none;">
        <!-- Table view will be rendered here by JS -->
        <!-- Sorting handled by JS, headers will have clickable sort icons/buttons -->
      </div>
    </section>

    <!-- Invite Teacher Section -->
    <section class="invite-teacher card">
      <h2>Invite Another Teacher</h2>
      <div class="form-group">
        <label for="invite-email">Teacher Email</label>
        <input type="email" id="invite-email" placeholder="teacher@example.com">
      </div>
      <div class="form-group">
        <label for="invite-role">Role</label>
        <select id="invite-role">
          <option value="viewer">Viewer</option>
          <option value="editor">Editor</option>
        </select>
      </div>
      <button class="btn-primary" onclick="inviteTeacher()">Invite Teacher</button>
      <div id="invite-status"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/exam-questions.js"></script>
</body>
</html>
